<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المعلم - منصة البرمجة</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fc; font-family: 'Cairo', 'Segoe UI', sans-serif; padding: 2rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    
    /* رأس الصفحة */
    .teacher-header {
      background: white;
      padding: 1rem 2rem;
      border-radius: 30px;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .teacher-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .teacher-avatar {
      background: #1f6e8c;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .logout-btn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
    }
    .logout-btn:hover { background: #a93226; }
    
    /* شريط التنقل السريع */
    .quick-actions {
      background: white;
      padding: 1rem;
      border-radius: 20px;
      margin-bottom: 2rem;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .quick-btn {
      background: #1f6e8c;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .quick-btn:hover { background: #0e5a77; }
    
    /* القسم الرئيسي - نفس تصميم الموقع العادي */
    .hero {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 40px;
      margin-bottom: 2rem;
    }
    .hero h1 { font-size: 2rem; color: #1f6e8c; }
    
    .grades-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }
    .grade-card {
      background: white;
      border-radius: 25px;
      padding: 1.5rem;
      text-align: center;
      transition: 0.3s;
      cursor: pointer;
      border: 1px solid #e2edf2;
    }
    .grade-card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }
    .grade-icon { font-size: 3rem; color: #1f6e8c; margin-bottom: 1rem; }
    .grade-title { font-size: 1.3rem; font-weight: bold; margin: 1rem 0; }
    .btn {
      display: inline-block;
      background: #1f6e8c;
      color: white;
      padding: 8px 20px;
      border-radius: 40px;
      text-decoration: none;
      margin-top: 1rem;
    }
    
    .ad-banner {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      border-radius: 15px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
    }
    
    footer { text-align: center; margin-top: 3rem; color: #628aa0; }
    
    @media (max-width: 700px) { body { padding: 1rem; } }
  </style>
</head>
<body>
<div class="container">
  
  <!-- رأس الصفحة للمعلم -->
  <div class="teacher-header">
    <div class="teacher-info">
      <div class="teacher-avatar">
        <i class="fas fa-chalkboard-user"></i>
      </div>
      <div>
        <h3>مرحباً، <span id="teacherName"></span></h3>
        <p><i class="fas fa-graduation-cap"></i> لديك صلاحية رفع وحذف الملفات</p>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
  </div>
  
  <!-- أزرار سريعة للمعلم -->
  <div class="quick-actions">
    <button class="quick-btn" onclick="scrollToUpload()"><i class="fas fa-upload"></i> رفع ملف جديد</button>
    <button class="quick-btn" onclick="window.location.href='index.html'"><i class="fas fa-home"></i> الصفحة الرئيسية</button>
  </div>
  
  <!-- الإعلانات -->
  <div class="ad-banner" id="adBanner1">
    <i class="fas fa-graduation-cap"></i> 🎓 عرض خاص: خصم 50% على دورات البرمجة
  </div>
  
  <!-- المحتوى الرئيسي (نفس index.html) -->
  <div class="hero">
    <i class="fas fa-laptop-code" style="font-size: 3rem; color: #1f6e8c;"></i>
    <h1>منصة البرمجة التعليمية</h1>
    <p>تعلم البرمجة وال ICT من الصف السادس حتى الثانوية</p>
  </div>
  
  <div id="dynamicContent" class="editable-content"></div>
  
  <h2><i class="fas fa-graduation-cap"></i> اختر صفك الدراسي</h2>
  <div class="grades-grid" id="gradesGrid"></div>
  
  <div class="ad-banner" id="adBanner2">
    <i class="fas fa-cloud-upload-alt"></i> 📚 رفع الملفات التعليمية متاح لكل مادة
  </div>
  
  <footer>
    <i class="fas fa-code"></i> منصة تعليمية متكاملة
  </footer>
</div>

<script src="data-config.js"></script>
<script>
  // التحقق من تسجيل الدخول
  if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
  }
  
  // عرض اسم المعلم
  const userName = localStorage.getItem("userName") || "المعلم";
  document.getElementById("teacherName").innerText = userName;
  
  // تحميل المحتوى النصي
  function loadHomeContent() {
    const container = document.getElementById('dynamicContent');
    if (window.siteConfig && window.siteConfig.homeContent) {
      container.innerHTML = window.siteConfig.homeContent;
    }
  }
  
  // بناء بطاقات الصفوف
  function buildGrades() {
    const grid = document.getElementById('gradesGrid');
    if (window.siteConfig && window.siteConfig.grades) {
      grid.innerHTML = window.siteConfig.grades.map(grade => `
        <div class="grade-card" onclick="location.href='${grade.link}'">
          <div class="grade-icon"><i class="fas ${grade.icon}"></i></div>
          <div class="grade-title">${grade.name}</div>
          <p>${grade.description}</p>
          <span class="btn">الدخول <i class="fas fa-arrow-left"></i></span>
        </div>
      `).join('');
    }
  }
  
  // الإعلانات الدائرية
  const adsList = window.siteConfig?.ads?.messages || [
    "🔥 اشترك الآن في دورة Python الشاملة",
    "📱 تطبيقنا الجديد متوفر على Google Play"
  ];
  let adIndex = 0;
  setInterval(() => {
    adIndex = (adIndex + 1) % adsList.length;
    const ad1 = document.getElementById("adBanner1");
    const ad2 = document.getElementById("adBanner2");
    if (ad1) ad1.innerHTML = `<i class="fas fa-ad"></i> ${adsList[adIndex]}`;
    if (ad2) ad2.innerHTML = `<i class="fas fa-megaphone"></i> ${adsList[(adIndex+2)%adsList.length]}`;
  }, 8000);
  
  document.getElementById("adBanner1").onclick = () => window.open("https://www.udemy.com", "_blank");
  document.getElementById("adBanner2").onclick = () => window.open("https://www.coursera.org", "_blank");
  
  // دالة للتمرير إلى قسم الرفع (في صفحة المادة)
  function scrollToUpload() {
    Swal.fire({
      title: 'رفع ملف جديد',
      text: 'يرجى الدخول إلى المادة التي تريد رفع ملف فيها أولاً',
      icon: 'info',
      confirmButtonText: 'حسناً'
    });
  }
  
  // تسجيل الخروج
  function logout() {
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("adminUser");
    localStorage.removeItem("userRole");
    localStorage.removeItem("userName");
    localStorage.removeItem("teacherSubject");
    window.location.href = "index.html";
  }
  
  loadHomeContent();
  buildGrades();
</script>
</body>
</html>
