<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مادة تعليمية - سهلها عليك (سحابي)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* اختصار للأنماط - يمكنك إضافة أنماطك الخاصة هنا */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#f0f4f8;font-family:'Cairo',sans-serif;padding:2rem;}
        .container{max-width:1200px;margin:auto;background:white;border-radius:30px;padding:2rem;}
        .btn-back{background:#1f6e8c;color:white;padding:8px 20px;border-radius:40px;text-decoration:none;display:inline-block;margin-bottom:1rem;}
        .upload-area{border:2px dashed #1f6e8c;padding:1.5rem;border-radius:20px;margin-top:2rem;background:#f9fbfe;}
        button{background:#1f6e8c;color:white;border:none;padding:8px 20px;border-radius:25px;cursor:pointer;}
        .file-card{background:#eef2f9;padding:12px;margin:10px 0;border-radius:15px;display:flex;justify-content:space-between;flex-wrap:wrap;}
        .teacher-badge{background:#27ae60;color:white;padding:5px 12px;border-radius:20px;display:inline-block;margin-bottom:10px;}
        footer{text-align:center;margin-top:2rem;padding-top:1rem;border-top:1px solid #ddd;}
        .signature{font-size:0.9rem;margin-top:8px;color:#2c3e66;}
    </style>
</head>
<body>
<div class="container">
    <a href="#" id="backLink" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للصف</a>
    <div id="teacherBadge"></div>
    <div id="subjectHeader"></div>
    
    <div id="uploadSection" style="display:none;" class="upload-area">
        <h3><i class="fas fa-upload"></i> رفع ملف تعليمي جديد</h3>
        <input type="file" id="subjectFile" style="margin:10px 0">
        <input type="text" id="fileDesc" placeholder="وصف الملف" style="width:70%; padding:8px;">
        <button id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> رفع الملف</button>
    </div>
    <h3>الملفات التعليمية</h3>
    <div id="filesList"></div>
    
    <footer>
        <div>© 2025 سهلها عليك – جميع الحقوق محفوظة</div>
        <div class="signature">✍️ <strong>م.عمرو ابراهيم البهادي</strong> – للتواصل: 01112151629</div>
    </footer>
</div>

<script src="data-config.js"></script>
<script>

    const SUPABASE_URL = "https://erdezlgxhzuwgvosyyfw.supabase.co/rest/v1/"; 
    const SUPABASE_ANON_KEY = "sb_publishable_qSLrhSPO3zmpb_pSy-H4zg_RYq4Lpcb";
    // -----------------------------------------------------
    
    // فحص وجود المكتبة وتهيئة العميل
    if (typeof supabase === 'undefined' || !supabase) {
        console.error("مكتبة Supabase لم يتم تحميلها. سيتم محاولة تهيئتها يدوياً.");
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
        var supabaseClient = supabase;
    }

    const BUCKET = "files";
    
    // استخراج معلومات الصف والمادة من رابط الصفحة
    const params = new URLSearchParams(location.search);
    const grade = params.get('grade');
    const subject = params.get('subject');
    document.getElementById("backLink").href = grade + ".html";
    
    // التحقق من تسجيل الدخول للمعلم
    const isLoggedIn = localStorage.getItem("loggedIn") === "true";
    if(isLoggedIn){
        document.getElementById("teacherBadge").innerHTML = `<div class="teacher-badge">مرحباً معلم - يمكنك رفع الملفات وإدارتها</div>`;
        document.getElementById("uploadSection").style.display = "block";
    }
    
    // دالة عرض الملفات من مجلد Supabase
    async function loadFiles(){
        const { data, error } = await supabaseClient.storage.from(BUCKET).list(`${grade}/${subject}/`);
        if(error || !data || data.length===0){
            document.getElementById("filesList").innerHTML = "<p>لا توجد ملفات مرفوعة لهذه المادة بعد.</p>";
            return;
        }
        let html = "";
        for(let file of data){
            const { publicUrl } = supabaseClient.storage.from(BUCKET).getPublicUrl(`${grade}/${subject}/${file.name}`);
            html += `<div class="file-card">
                        <div><strong>${escapeHtml(file.name)}</strong></div>
                        <div>
                            <a href="${publicUrl}" download class="btn-sm" style="background:#1f6e8c; padding:5px 10px; border-radius:20px; color:white; text-decoration:none;">تحميل</a> 
                            ${isLoggedIn ? `<button onclick="deleteFile('${grade}/${subject}/${file.name}')" style="margin-right:10px;">حذف</button>` : ''}
                        </div>
                    </div>`;
        }
        document.getElementById("filesList").innerHTML = html;
    }
    
    // دالة رفع ملف جديد (للمعلم فقط)
    document.getElementById("uploadBtn")?.addEventListener("click", async () => {
        if(!isLoggedIn) return Swal.fire("غير مسموح", "هذه الخاصية للمعلمين فقط", "error");
        
        const input = document.getElementById("subjectFile");
        if(!input.files.length) return Swal.fire("تنبيه", "الرجاء اختيار ملف أولاً", "warning");
        
        const file = input.files[0];
        const desc = document.getElementById("fileDesc").value;
        const path = `${grade}/${subject}/${file.name}`;
        
        // رفع الملف إلى التخزين السحابي مباشرةً
        const { error } = await supabaseClient.storage.from(BUCKET).upload(path, file, { upsert: true });
        if(error){
            console.error(error);
            Swal.fire("فشل الرفع", error.message, "error");
        } else {
            Swal.fire("تم الرفع بنجاح!", "الملف الآن متاح في السحابة المركزية.", "success");
            loadFiles();
            document.getElementById("subjectFile").value = "";
            document.getElementById("fileDesc").value = "";
        }
    });
    
    // دالة حذف ملف
    window.deleteFile = async (path) => {
        if(!confirm("هل أنت متأكد من حذف هذا الملف نهائياً؟")) return;
        await supabaseClient.storage.from(BUCKET).remove([path]);
        loadFiles();
    };
    
    // دالة لعرض محتوى المادة من ملف الإعدادات (اختصاراً)
    const subjectData = (window.siteConfig?.subjectContent?.[subject]) || { title: subject || "المادة" };
    document.getElementById("subjectHeader").innerHTML = `<h1>${subjectData.title}</h1><p>${subjectData.description || 'محتوى تعليمي تفاعلي'}</p>`;
    
    // دالة مساعدة للحماية من أكواد HTML ضارة
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadFiles();
</script>
</body>
</html>
